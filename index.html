<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일일업무보고서</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="document-container">
      <nav class="toolbar">
        <!-- 일일업무 보고서 버튼 -->
        <button id="saveBtn" class="btn btn-primary daily-report-btn">💾 저장</button>
        <button id="clearBtn" class="btn btn-warning daily-report-btn">🗑️ 초기화</button>
        <button id="exportExcelBtn" class="btn btn-success daily-report-btn">
          📊 Excel 내보내기
        </button>
        <button id="exportPdfBtn" class="btn btn-info daily-report-btn">📄 PDF 내보내기</button>

        <!-- 영수증 버튼 -->
        <button id="saveReceiptBtn" class="btn btn-primary receipt-btn" style="display: none;">💾 저장</button>
        <button id="clearReceiptBtn" class="btn btn-warning receipt-btn" style="display: none;">🗑️ 초기화</button>
        <button id="exportReceiptExcelBtn" class="btn btn-success receipt-btn" style="display: none;">
          📊 Excel 내보내기
        </button>
        <button id="exportReceiptPdfBtn" class="btn btn-info receipt-btn" style="display: none;">📄 PDF 내보내기</button>
      </nav>

      <div class="main-layout">
        <!-- 왼쪽 탭 네비게이션 -->
        <aside class="tab-navigation">
          <button class="tab-btn active" data-tab="daily-report">
            <span class="tab-icon">📝</span>
            <span class="tab-label">일일업무</span>
          </button>
          <button class="tab-btn" data-tab="receipt">
            <span class="tab-icon">🧾</span>
            <span class="tab-label">영수증</span>
          </button>
        </aside>

        <!-- 메인 컨텐츠 영역 -->
        <main class="content-area">
          <!-- 일일업무보고서 탭 -->
          <div id="daily-report-tab" class="tab-content active">
            <div class="document">
          <header class="document-header">
            <h1>일일업무보고서</h1>
            <div class="header-info">
              <div class="info-row">
                <label for="reportDate" class="label">보고서 날짜:</label>
                <input type="date" id="reportDate" class="date-input" />
              </div>
              <div class="info-row">
                <label for="reporter" class="label">작성자:</label>
                <input
                  type="text"
                  id="reporter"
                  class="text-input"
                  placeholder="작성자명을 입력하세요"
                />
              </div>
            </div>
          </header>

          <section class="section">
            <h2>1. 일일 업무</h2>
            <div class="table-container">
              <table id="dailyWorkTable" class="work-table">
                <thead>
                  <tr>
                    <th class="time-col">시간</th>
                    <th class="work-col">업무내용</th>
                    <th class="note-col">비고</th>
                  </tr>
                </thead>
                <tbody id="dailyWorkTableBody"></tbody>
              </table>
              <div class="table-controls">
                <button id="addDailyRow" class="add-row-btn">+ 행 추가</button>
                <button id="removeDailyRow" class="remove-row-btn">
                  - 행 제거
                </button>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>2. 지시 및 이행사항</h2>
            <textarea
              id="instructions"
              class="text-area"
              placeholder="지시받은 사항과 이행 내용을 작성해주세요"
              rows="4"
            ></textarea>
          </section>

          <section class="section">
            <h2>3. 기타 보고사항</h2>
            <textarea
              id="otherReports"
              class="text-area"
              placeholder="기타 보고할 사항을 작성해주세요"
              rows="4"
            ></textarea>
          </section>

          <section class="section">
            <h2>4. 주간 주요 업무 계획</h2>
            <div class="table-container">
              <table id="weeklyPlanTable" class="plan-table">
                <thead>
                  <tr>
                    <th class="plan-col">주간 업무 계획</th>
                  </tr>
                </thead>
                <tbody id="weeklyPlanTableBody"></tbody>
              </table>
              <div class="table-controls">
                <button id="addWeeklyRow" class="add-row-btn">+ 행 추가</button>
                <button id="removeWeeklyRow" class="remove-row-btn">
                  - 행 제거
                </button>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>5. 월간 주요 업무 계획</h2>
            <div class="table-container">
              <table id="monthlyPlanTable" class="plan-table">
                <thead>
                  <tr>
                    <th class="plan-col">월간 업무 계획</th>
                  </tr>
                </thead>
                <tbody id="monthlyPlanTableBody"></tbody>
              </table>
              <div class="table-controls">
                <button id="addMonthlyRow" class="add-row-btn">+ 행 추가</button>
                <button id="removeMonthlyRow" class="remove-row-btn">
                  - 행 제거
                </button>
              </div>
            </div>
          </section>
            </div>
          </div>

          <!-- 영수증 탭 -->
          <div id="receipt-tab" class="tab-content">
            <div class="document">
              <header class="document-header">
                <h1>월간 영수증 정리</h1>
                <div class="header-info">
                  <div class="info-row">
                    <label for="receiptDate" class="label">제출 날짜:</label>
                    <input type="date" id="receiptDate" class="date-input" />
                  </div>
                  <div class="info-row">
                    <label for="receiptAmount" class="label">총 금액:</label>
                    <input type="number" id="receiptAmount" class="text-input" placeholder="0" style="width: 150px;" />
                    <span style="margin-left: 5px;">원</span>
                  </div>
                </div>
              </header>

              <section class="section">
                <h2>영수증 정보</h2>
                <section class="section">
                  <div class="table-container">
                    <table id="bill_log_table" class="bill-log-table">
                      <thead>
                        <tr>
                          <th class="date-col">날짜</th>
                          <th class="item-col">품목</th>
                          <th class="quantity-col">수량</th>
                          <th class="price-col">금액</th>
                          <th class="note-col">비고</th>
                        </tr>
                      </thead>
                      <tbody id="bill_log_tableBody"></tbody>
                    </table>
                    <div class="table-controls">
                      <button id="addBillLogRow" class="add-row-btn">+ 행 추가</button>
                      <button id="removeBillLogRow" class="remove-row-btn">
                        - 행 제거
                      </button>
                    </div>
                  </div>
                </section>
              </section>

              <section class="section">
                <h2>월간 통계</h2>
                <div id="monthlyStats" class="stats-container">
                  <!-- 통계가 여기 렌더링됩니다 -->
                </div>
              </section>
            </div>
          </div>
        </main>

        <!-- 오른쪽 사이드바 -->
        <aside class="sidebar-right">
          <!-- 일일업무 보고서 사이드바 -->
          <div id="daily-report-sidebar" class="sidebar-content active">
            <h3>📂 저장된 보고서 목록</h3>
            <div id="reportList" class="report-list"></div>
          </div>

          <!-- 영수증 사이드바 -->
          <div id="receipt-sidebar" class="sidebar-content">
            <h3>🧾 저장된 영수증 목록</h3>
            <div id="receiptList" class="report-list"></div>
          </div>
        </aside>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then((registration) => {
            console.log('Service Worker registered with scope:', registration.scope);
          }).catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
